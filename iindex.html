<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Demo</title>

<style>
body{
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#fff;
}
.container{
    text-align:center;
}
input{
    width:500px;
    max-width:90%;
    padding:15px;
    border-radius:30px;
    border:1px solid #ccc;
    font-size:18px;
}
button{
    margin-top:20px;
    padding:12px 30px;
    font-size:16px;
}
.notice{
    color:#666;
    margin-top:15px;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">
<h2>Search Demo</h2>

<form action="https://formspree.io/f/xojaevjr" method="POST">
    <input
        type="text"
        name="Search"
        placeholder="Type something..."
        required>

    <br>

    <button type="submit">Submit</button>
</form>

<p class="notice">
By submitting, your search text will be sent to the site owner.
</p>

</div>

</body>
</html>
