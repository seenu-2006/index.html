<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:380px;
    background:#fff;
    border-radius:12px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.2);
}

.logo{
    width:170px;
    height:170px;
    object-fit:contain;
    margin-bottom:15px;
}

h2{
    color:#c40000;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#c40000;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:17px;
}

button:hover{
    background:#990000;
}
</style>

</head>
<body>

<div class="login-box">

<img src="logo.png" class="logo" alt="College Logo">

<h2>Student Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>
</html>
