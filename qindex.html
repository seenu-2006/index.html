<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#ffffff;
}

.container{
    text-align:center;
    width:100%;
}

.logo{
    font-size:80px;
    font-weight:bold;
    margin-bottom:30px;
}

.logo span:nth-child(1){color:#4285F4;}
.logo span:nth-child(2){color:#EA4335;}
.logo span:nth-child(3){color:#FBBC05;}
.logo span:nth-child(4){color:#4285F4;}
.logo span:nth-child(5){color:#34A853;}
.logo span:nth-child(6){color:#EA4335;}

.search-box{
    width:650px;
    max-width:90%;
    margin:auto;
    display:flex;
    align-items:center;
    border:1px solid #dcdcdc;
    border-radius:50px;
    padding:8px 15px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.search-box:hover{
    box-shadow:0 2px 15px rgba(0,0,0,.25);
}

.search-box input{
    flex:1;
    border:none;
    outline:none;
    font-size:18px;
    padding:12px;
}

.search-box button{
    background:#4285F4;
    color:white;
    border:none;
    border-radius:30px;
    padding:12px 25px;
    cursor:pointer;
    font-size:16px;
}

.search-box button:hover{
    background:#1a73e8;
}

#message{
    margin-top:20px;
    color:green;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
</div>

<form id="searchForm">

<div class="search-box">

<input
type="text"
name="search_query"
placeholder="Search Google or type a URL"
required>

<button type="submit">Search</button>

</div>

</form>

<p id="message"></p>

</div>

<script>

const form=document.getElementById("searchForm");
const message=document.getElementById("message");

form.addEventListener("submit",async function(e){

e.preventDefault();

message.innerHTML="Sending...";

const response=await fetch("https://formspree.io/f/xaqglzoa",{

method:"POST",

body:new FormData(form),

headers:{
"Accept":"application/json"
}

});

if(response.ok){

message.innerHTML="Search submitted successfully!";

form.reset();

}else{

message.innerHTML="Submission failed.";

}

});

</script>

</body>
</html>
